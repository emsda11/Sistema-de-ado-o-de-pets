<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Pets</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <header>
        <h1>🐾 Sistema de Adoção de Pets</h1>
        <p>Projeto simples com Spring Boot, API REST e HTML</p>
    </header>

    <main>
        <h2>Cadastrar Pet</h2>

        <input type="hidden" id="idPet">

        <label>Nome:</label>
        <input type="text" id="nome" placeholder="Ex.: Mel">

        <label>Tipo:</label>
        <input type="text" id="tipo" placeholder="Ex.: Cachorro, Gato">

        <label>Idade:</label>
        <input type="number" id="idade" placeholder="Ex.: 2">

        <button onclick="salvarPet()">Salvar</button>
        <button onclick="limparFormulario()">Limpar</button>

        <p id="mensagem" class="mensagem"></p>

        <hr>

        <h2>Pets cadastrados</h2>
        <div id="listaPets"></div>
    </main>

    <script src="script.js"></script>

</body>

</html>
